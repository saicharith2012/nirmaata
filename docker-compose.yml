services:
  postgres:
    image: postgres:18-alpine
    container_name: nirmaata-postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - "pg_data:/var/lib/postgresql"

volumes:
  pg_data:
